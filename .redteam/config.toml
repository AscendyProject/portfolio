# redteam harness config — ascendy-portfolio (Python).

[project]
name = "ascendy-portfolio"
context_file = ".redteam/docs/project-context.md"
security_checklist = ".redteam/docs/security-checklist.md"
test_conventions_file = ".redteam/docs/test-conventions.md"
source_dirs = ["portfolio/"]
test_dir = "tests/"
test_file_glob = "test_*.py"
verify_command = "bash .redteam/scripts/verify.sh"
verification_allowlist = ["pytest", "ruff"]
branch_prefix = "portfolio"
base_branch = "main"

[models]
planner = "claude-opus-4-8"
implementer = "claude-sonnet-4-6"
reviewer = "codex"
rescue = "codex"
