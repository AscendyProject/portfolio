# redteam harness config — portfolio (Python).

[project]
name = "portfolio"
context_file = ".redteam/docs/project-context.md"
security_checklist = ".redteam/docs/security-checklist.md"
test_conventions_file = ".redteam/docs/test-conventions.md"
source_dirs = ["portfolio/"]
test_dir = "tests/"
test_file_glob = "test_*.py"
verify_command = "bash .redteam/scripts/verify.sh"
verification_allowlist = ["pytest", "ruff"]
branch_prefix = "portfolio"
base_branch = "main"

# Reviewer/rescue run on codex (OpenAI) — a different provider family from the
# claude worker, satisfying the cross-provider review principle, and natively
# supported by the vendored harness adapters. (A prior session switched to Gemini
# via the `agy` CLI while the codex spend cap was hit; the cap has since cleared
# 2026-06-19, so we revert to codex — orchestrator-driven, no manual agy step.)
[models]
planner = "claude-opus-4-8"
implementer = "claude-sonnet-4-6"
reviewer = "codex"
rescue = "codex"
